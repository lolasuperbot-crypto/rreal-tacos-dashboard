name: Weekly Review Report — 1 & 2 Star Analysis

on:
  # Every Monday at 8:00 AM ET (12:00 UTC)
  schedule:
    - cron: '0 12 * * 1'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    name: Generate PDF & Email to Michelle

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load Lola Memory
        run: |
          echo "=== LOLA MEMORY ==="
          cat memory/LOLA-MEMORY.md || echo "Memory file not found"
          echo "==================="

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install reportlab

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: |
          npm install nodemailer

      - name: Generate PDF report
        run: |
          python3 generate_review_pdf.py

      - name: Send email with PDF
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_FROM: lolasuperbot@gmail.com
        run: |
          node generate-review-report.js

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-review-report
          path: Wk14_Review_Report_Professional.pdf
          retention-days: 90
