name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load Lola Memory
        run: |
          echo '=== LOLA MEMORY ==='
          cat memory/LOLA-MEMORY.md || echo "Memory file not found"
          echo '=== REPORT STANDARDS ==='
          cat scripts/REPORT-STANDARDS.md || echo "Standards file not found"

      - name: Prepare dashboard files
        run: |
          mkdir -p /tmp/site
          # Copy only the dashboard files — exclude heavy/private directories
          rsync -av \
            --exclude='whatsapp-bridge/' \
            --exclude='node_modules/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='memory/' \
            --exclude='playbooks/' \
            --exclude='credentials.md' \
            --exclude='BOOTSTRAP.md' \
            --exclude='SOUL.md' \
            --exclude='USER.md' \
            --exclude='AGENTS.md' \
            --exclude='HEARTBEAT.md' \
            --exclude='IDENTITY.md' \
            --exclude='TOOLS.md' \
            --exclude='MEMORY.md' \
            --exclude='refresh_log.json' \
            . /tmp/site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '/tmp/site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
