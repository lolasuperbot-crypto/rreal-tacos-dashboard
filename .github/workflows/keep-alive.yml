name: Lola Keep Alive

on:
  schedule:
    - cron: '0 12 * * *'   # Daily at 12pm UTC (8am ET)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load Lola Memory
        run: |
          echo '=== LOLA MEMORY ==='
          cat memory/LOLA-MEMORY.md || echo "Memory file not found"
          echo '=== REPORT STANDARDS ==='
          cat scripts/REPORT-STANDARDS.md || echo "Standards file not found"

      - name: Update heartbeat
        run: |
          mkdir -p memory
          echo "Lola alive: $(date -u '+%Y-%m-%d %H:%M UTC')" >> memory/heartbeat.log
          tail -30 memory/heartbeat.log > memory/heartbeat.tmp
          mv memory/heartbeat.tmp memory/heartbeat.log

      - name: Commit heartbeat
        run: |
          git config user.email 'lola@rrealtacos.com'
          git config user.name 'Lola AI'
          git add memory/heartbeat.log
          DATE=$(date '+%Y-%m-%d')
          git diff --staged --quiet || git commit -m "Lola heartbeat ${DATE}"
          git push || true
